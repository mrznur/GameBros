<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Login - Bashpo</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-inter">
    <header class="navbar bg-base-100 rounded-lg p-4">
        <a href="/"><img src="{{ url_for('static', filename='img/logo.jpg') }}" class="w-20 rounded-xl"></a>
    </header>

    <section class="flex justify-center items-center min-h-[80vh] bg-cover" style='background-image: url("{{ url_for("static", filename="img/bg-1.jpg") }}");'>
        <form method="POST" action="{{ url_for('auth.login') }}" class="bg-[rgba(30,29,55,1)] rounded-3xl p-8 w-[90%] max-w-[500px]">
            <h2 class="text-3xl font-bold text-center bg-gradient-to-r from-sky-500 via-purple-500 to-pink-500 text-transparent bg-clip-text">SIGN IN</h2>

            <label class="block mt-5 font-bold text-white">Username</label>
            <input name="username" required class="input input-bordered w-full mt-2 bg-white text-black">

            <label class="block mt-4 font-bold text-white">Password</label>
            <input type="password" name="password" required class="input input-bordered w-full mt-2 bg-white text-black">

            <button type="submit" class="btn mt-6 w-full bg-gradient-to-r from-sky-600 via-purple-700 to-pink-800 text-white">SIGN IN</button>

            <div class="mt-4 text-center">
                <a href="#" class="text-sky-500 underline">Forgot Password?</a>
            </div>

            <div class="text-center mt-6">
                <p class="text-white">New to Bashpo?</p>
                <a href="{{ url_for('auth.register_buyer') }}" class="btn w-full mt-2 bg-purple-600 text-white">Create Buyer Account</a>
                <a href="{{ url_for('auth.register_developer') }}" class="btn w-full mt-2 bg-pink-600 text-white">Create Developer Account</a>
            </div>
        </form>
    </section>
</body>
</html>
